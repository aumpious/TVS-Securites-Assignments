[sensor]
read_interval_sec = 1
buffer_size = 100

[thresholds]
temp_alarm_celsius = 35.0

[simulation]
start_temp_celsius = 25.0
start_humidity_percent = 50.0
temp_drift_max = 0.5
humidity_drift_max = 1.0
min_temp_celsius = -10.0
max_temp_celsius = 60.0
min_humidity_percent = 0.0
max_humidity_percent = 100.0

[output]
csv_path = output/readings.csv
log_path = output/sensor_monitor.log

[mqtt]
enabled = true
broker = test.mosquitto.org
port = 1883
topic = tvs_assignment/sensor

[rest_api]
enabled = true
host = 127.0.0.1
port = 8899
